{% load static %}
<!doctype html>
<html>
<head><meta charset="utf-8"><title>Cleaning - {{ train.number }}</title></head>
<body>
    <link rel="stylesheet" href="{% static 'depot/css/detail.css' %}">

  <a href="{% url 'depot:mileage_detail' train.number %}">← Mileage</a> |
  <a href="{% url 'depot:dashboard' %}">Dashboard</a>

  <h2>Cleaning — {{ train.number }}</h2>

  <h4>Existing slots</h4>
  <ul>
    {% for s in slots %}
      <li>{{ s.bay.name }} — {{ s.start_time }} → {{ s.end_time }}</li>
    {% empty %}
      <li>No slots</li>
    {% endfor %}
  </ul>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create slot & Continue → Geometry</button>
  </form>
</body>
</html>
